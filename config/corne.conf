# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y

# --- Ahorro de bateria ---
# Deep sleep: tras un tiempo de inactividad, la mitad entra en sueño profundo
# (se despierta al pulsar una tecla). Alarga mucho la duracion de la bateria.
CONFIG_ZMK_SLEEP=y

# Tiempo de inactividad (en ms) antes de entrar en sueño profundo.
# 3600000 ms = 60 minutos (1 hora). Sube o baja a tu gusto.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
